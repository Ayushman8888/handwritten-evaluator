<!DOCTYPE html>
<html>
<head>
    <title>Handwritten Assignment Upload</title>
</head>
<body>
    <h1>Upload your handwritten assignment</h1>
    <form action="/" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".png,.jpg,.jpeg,.pdf" required>
        <button type="submit">Upload & Evaluate</button>
    </form>
</body>
</html>
